# ──────────────────────────────────────────────────────────────────────────────
# File: .github/workflows/github-release-to-baidupan.yml
# 用途：手动触发；下载指定 GitHub 仓库的最新 Release 所有资产，
#      若存在分卷（.001/.002/...）则先解压再上传到百度网盘指定目录
#      （以 release name 为子文件夹）。
# 前置：
#   - Secrets: BAIDU_COOKIE（百度网盘 Cookie 登录）
# ──────────────────────────────────────────────────────────────────────────────

name: GitHub Release → 百度网盘

on:
  workflow_dispatch:
    inputs:
      src_repo:
        description: "源仓库（owner/repo 格式）"
        required: true
        default: "lcdyk0517/arkos4clone"
      dest_dir:
        description: "百度网盘目标根目录"
        required: true
        default: "/lcdyk有的掌机/魔改包/arkos4clone"

permissions:
  contents: read

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Install base deps
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl ca-certificates jq p7zip-full

      - name: Install BaiduPCS-Go
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="v4.0.1"
          ARCHIVE="BaiduPCS-Go-${VERSION}-linux-amd64.zip"
          URL="https://github.com/qjfoidnh/BaiduPCS-Go/releases/download/${VERSION}/${ARCHIVE}"
          curl -L "$URL" -o /tmp/bpcs.zip
          mkdir -p /tmp/bpcs
          unzip -o /tmp/bpcs.zip -d /tmp/bpcs
          BPCS_BIN=$(find /tmp/bpcs -type f -name 'BaiduPCS-Go' | head -n1)
          if [[ -z "${BPCS_BIN}" ]]; then
            echo "BaiduPCS-Go binary not found" >&2
            exit 1
          fi
          sudo install -m 0755 "${BPCS_BIN}" /usr/local/bin/BaiduPCS-Go
          BaiduPCS-Go -v

      - name: Login BaiduPCS-Go with Cookie
        env:
          BAIDU_COOKIE: ${{ secrets.BAIDU_COOKIE }}
        shell: bash
        run: |
          set -euxo pipefail
          if [[ -z "${BAIDU_COOKIE:-}" ]]; then
            echo "BAIDU_COOKIE is required." >&2
            exit 1
          fi
          if ! BaiduPCS-Go login -cookies "$BAIDU_COOKIE"; then
            BaiduPCS-Go login -cookie "$BAIDU_COOKIE"
          fi
          BaiduPCS-Go who

      - name: Fetch latest release info
        id: release
        env:
          SRC_REPO: ${{ github.event.inputs.src_repo }}
        shell: bash
        run: |
          set -euo pipefail
          LATEST=$(curl -s "https://api.github.com/repos/${SRC_REPO}/releases/latest")
          TAG=$(echo "$LATEST" | jq -r '.tag_name')
          NAME=$(echo "$LATEST" | jq -r '.name // empty')
          [[ -z "$NAME" ]] && NAME="$TAG"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

          ASSETS=$(echo "$LATEST" | jq -c '.assets[]')
          COUNT=$(echo "$LATEST" | jq '.assets | length')
          echo "Found $COUNT assets for release $NAME (tag: $TAG)"

          # 保存每个资产的 url 和 filename
          echo "$LATEST" | jq -r '.assets[] | "\(.browser_download_url)\t\(.name)\t\(.size)"' > /tmp/assets.txt

          echo "assets<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/assets.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download, extract and upload to Baidu Pan
        env:
          DEST_DIR: ${{ github.event.inputs.dest_dir }}
          RELEASE_NAME: ${{ steps.release.outputs.name }}
        shell: bash
        run: |
          set -euo pipefail

          REMOTE_DIR="${DEST_DIR}/${RELEASE_NAME}"
          echo "Target dir: $REMOTE_DIR"

          # 逐级创建目录
          IFS='/' read -ra DIR_PARTS <<< "$REMOTE_DIR"
          CURRENT=""
          for part in "${DIR_PARTS[@]}"; do
            [[ -z "$part" ]] && CURRENT="/" && continue
            CURRENT="${CURRENT}/${part}"
            echo "  mkdir: $CURRENT"
            BaiduPCS-Go mkdir "$CURRENT" || true
          done
          echo "  Verify: $(BaiduPCS-Go ls "$REMOTE_DIR" 2>&1 | head -1)"

          workdir="$GITHUB_WORKSPACE/.dl_cache"
          mkdir -p "$workdir"
          cd "$workdir"

          retry() {
            local n=0 max=3 delay=5
            until "$@"; do
              n=$((n+1))
              if (( n >= max )); then return 1; fi
              echo "Retry $n/$max: $*" >&2
              sleep $delay
            done
          }

          # ── 第一步：下载所有资产 ──
          echo "=== Step 1: Download all assets ==="
          TOTAL=$(wc -l < /tmp/assets.txt)
          IDX=0
          while IFS=$'\t' read -r URL FILENAME SIZE; do
            IDX=$((IDX+1))
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "==> [$IDX/$TOTAL] Downloading: $FILENAME (${SIZE_MB}MB)"
            rm -f -- "$FILENAME"
            if ! retry curl -L --progress-bar -o "$FILENAME" "$URL"; then
              echo "    Download failed: $FILENAME" >&2
              exit 1
            fi
            echo "    OK: $FILENAME ($(stat -c '%s' "$FILENAME" | awk '{printf "%.0fMB", $1/1024/1024}'))"
          done < /tmp/assets.txt

          echo ""
          echo "=== Step 2: Detect and extract split archives ==="

          # ── 第二步：检测分卷并解压 ──
          # 用 glob 直接找所有 .001 文件作为分卷入口
          upload_files=()
          has_split=false

          for first_part in *.001; do
            [[ -f "$first_part" ]] || continue
            has_split=true
            base="${first_part%.001}"
            echo "  Split group: $base"
            echo "  Extracting from $first_part ..."
            rm -rf /tmp/extract_out
            if ! 7z x -y "$first_part" -o/tmp/extract_out; then
              echo "  ERROR: 7z extraction failed for $base" >&2
              exit 1
            fi
            while IFS= read -r ef; do
              upload_files+=("$ef")
              echo "  Extracted: $(basename "$ef")"
            done < <(find /tmp/extract_out -maxdepth 1 -type f -printf '%p\n' | sort)
          done

          # 非分卷文件直接加入上传列表
          for f in *; do
            [[ -f "$f" ]] || continue
            [[ "$f" =~ \.0[0-9]{2,}$ ]] && continue
            upload_files+=("$workdir/$f")
          done

          echo ""
          echo "=== Step 3: Upload to Baidu Pan ==="
          echo "  Files to upload: ${#upload_files[@]}"
          for f in "${upload_files[@]}"; do
            size_mb=$(stat -c '%s' "$f" 2>/dev/null | awk '{printf "%.0f", $1/1024/1024}')
            echo "  Uploading: $f (${size_mb}MB)"
            if ! retry BaiduPCS-Go upload --norapid --policy overwrite "$f" "$REMOTE_DIR/"; then
              echo "  ERROR: Upload failed: $f" >&2
              exit 1
            fi
            echo "  OK: $f"
            rm -f -- "$f"
          done

          # 清理解压临时目录
          rm -rf /tmp/extract_out

          echo ""
          echo "=== Done ==="
          echo "All files uploaded to $REMOTE_DIR"
          BaiduPCS-Go ls "$REMOTE_DIR"
